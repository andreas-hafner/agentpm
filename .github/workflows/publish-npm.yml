name: publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run validation and npm publish --dry-run without publishing
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Inspect package contents
        run: pnpm pack:cli

      - name: Configure npm authentication
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured. Add it as a GitHub Actions repository secret."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          npm whoami --registry=https://registry.npmjs.org/

      - name: Publish dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --dry-run

      - name: Publish to npm
        if: ${{ (github.event_name == 'release' && github.event.release.target_commitish == 'master') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run && github.ref_name == 'master') }}
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Refuse non-master publish
        if: ${{ (github.event_name == 'release' && github.event.release.target_commitish != 'master') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run && github.ref_name != 'master') }}
        run: |
          echo "npm publish is restricted to master."
          echo "Current ref: ${{ github.ref_name }}"
          echo "Release target: ${{ github.event.release.target_commitish }}"
          exit 1
